version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "nuget"
    assignees:
      - "richardsondev"
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "richardsondev"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
